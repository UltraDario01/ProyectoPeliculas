<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineVault — Películas</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <!-- Estilos propios -->
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <div class="header-grain"></div>
    <div class="container d-flex align-items-center justify-content-between py-4">
      <div class="brand">
        <span class="brand-icon"><i class="bi bi-film"></i></span>
        <span class="brand-name">CineVault</span>
      </div>
      <button class="btn btn-add" data-bs-toggle="modal" data-bs-target="#peliculaModal" id="btnNueva">
        <i class="bi bi-plus-lg me-1"></i> Nueva película
      </button>
    </div>
  </header>

  <!-- ── BARRA DE BÚSQUEDA ── -->
  <section class="search-bar-section">
    <div class="container">
      <div class="search-wrap">
        <i class="bi bi-search search-icon"></i>
        <input type="text" id="busqueda" class="form-control search-input" placeholder="Buscar por título…"/>
      </div>
    </div>
  </section>

  <!-- ── ESTADÍSTICAS ── -->
  <section class="stats-section">
    <div class="container">
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-label">Total películas</span>
          <span class="stat-value" id="totalPeliculas">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Puntaje promedio</span>
          <span class="stat-value" id="puntajePromedio">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Duración promedio</span>
          <span class="stat-value" id="duracionPromedio">—</span>
        </div>
      </div>
    </div>
  </section>

  <!-- ── GRID DE PELÍCULAS ── -->
  <main class="container pb-5">
    <div class="row g-4" id="peliculasGrid">
      <!-- Las tarjetas se generan con JS -->
    </div>

    <!-- Estado vacío -->
    <div id="estadoVacio" class="empty-state d-none">
      <i class="bi bi-camera-reels"></i>
      <p>No hay películas aún.<br/>¡Agrega la primera!</p>
    </div>
  </main>

  <!-- ── MODAL: AGREGAR / EDITAR ── -->
  <div class="modal fade" id="peliculaModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content modal-dark">

        <div class="modal-header border-0">
          <h5 class="modal-title" id="modalLabel">Nueva película</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>

        <div class="modal-body px-4 pb-2">
          <input type="hidden" id="peliculaId"/>

          <div class="mb-3">
            <label class="form-label-custom" for="titulo">Título <span class="text-danger">*</span></label>
            <input type="text" class="form-control input-dark" id="titulo" placeholder="Ej. Interstellar" maxlength="120"/>
          </div>

          <div class="mb-3">
            <label class="form-label-custom" for="descripcion">Descripción</label>
            <textarea class="form-control input-dark" id="descripcion" rows="3"
              placeholder="Sinopsis breve…" maxlength="500"></textarea>
          </div>

          <div class="row g-3">
            <div class="col-6">
              <label class="form-label-custom" for="puntaje">Puntaje (0–10) <span class="text-danger">*</span></label>
              <input type="number" class="form-control input-dark" id="puntaje"
                min="0" max="10" step="0.1" placeholder="8.5"/>
            </div>
            <div class="col-6">
              <label class="form-label-custom" for="duracion">Duración (min) <span class="text-danger">*</span></label>
              <input type="number" class="form-control input-dark" id="duracion"
                min="1" max="999" placeholder="169"/>
            </div>
          </div>

          <!-- Mensaje de error -->
          <div id="formError" class="alert alert-danger mt-3 d-none py-2 small" role="alert"></div>
        </div>

        <div class="modal-footer border-0 px-4 pb-4">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-add" id="btnGuardar">
            <i class="bi bi-floppy me-1"></i> Guardar
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- ── MODAL: CONFIRMAR ELIMINAR ── -->
  <div class="modal fade" id="eliminarModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content modal-dark text-center p-4">
        <div class="delete-icon-wrap mb-3">
          <i class="bi bi-trash3"></i>
        </div>
        <h6 class="mb-1 fw-semibold">¿Eliminar película?</h6>
        <p class="text-muted small mb-4" id="eliminarNombre"></p>
        <div class="d-flex gap-2 justify-content-center">
          <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-danger btn-sm" id="btnConfirmarEliminar">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Lógica CRUD -->
  <script src="main.js"></script>
</body>
</html>
